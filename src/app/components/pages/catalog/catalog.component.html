<div class="main__container-shop p-5 container align-items-baseline wow animate__animated animate__fadeInLeft">
  <h2 class="text-center mb-5 fw-bold">Наши чайные коллекции</h2>
  <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-5">
    <div class="col d-flex" *ngFor="let product of catalog">
      <div class="card shadow-sm w-100">
        <a class="test-popup-link" href="assets/images/image2.png">
          <img src="{{product.image}}" class="card-img-top" alt="...">
        </a>
        <div class="card-body d-flex flex-column align-items-start">
          <h5 class="card-title fw-bold">{{ product.title }}</h5>
          <p class="card-text p-0 pb-2 wow animate__heartBeat">{{
              product.description | truncateText
            }}</p>
          <a class="btn btn-primary px-5 hvr-pulse hvr-float-shadow mt-auto" [routerLink]="['/product', product.id]">Подробнее</a>
        </div>
      </div>
    </div>
  </div>
</div>
